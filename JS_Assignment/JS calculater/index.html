<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>

    <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  min-height: 100vh;
  
  display: flex;
  justify-content: center;
  align-items: center;
}


.calculator {
  width: 350px;
  padding: 25px;
  border-radius: 28px;
  background: linear-gradient(145deg, #1b1b2e, #121220);
  box-shadow:
    0 25px 50px rgba(0, 0, 0, 0.6),
    inset 0 0 0.5px rgba(255, 255, 255, 0.2);
}


.calculator input {
  width: 100%;
  border: none;
  outline: none;
  border-radius: 18px;
  padding: 14px 18px;
  margin-bottom: 12px;
  text-align: right;
  color: #fff;
  background: linear-gradient(145deg, #26263b, #1a1a2d);
  box-shadow: inset 4px 4px 8px rgba(0,0,0,0.4),
              inset -4px -4px 8px rgba(255,255,255,0.05);
}

#expression {
  font-size: 19px;
  opacity: 0.75;
}

#result {
  font-size: 30px;
  font-weight: 600;
  color: #4dfcff;
}


.buttons {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}


button {
  height: 58px;
  border-radius: 18px;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: #fff;
  background: linear-gradient(145deg, #24243a, #1a1a2e);
  box-shadow: 6px 6px 12px rgba(0,0,0,0.6),
              -3px -3px 8px rgba(255,255,255,0.05);
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(0, 255, 255, 0.25);
}

button:active {
  transform: scale(0.92);
}


.zero {
  grid-column: span 1;
}

.equal {
  background: linear-gradient(145deg, #00f2fe, #4facfe);
  color: #000;
  font-weight: bold;
}

.equal:hover {
  box-shadow: 0 0 25px rgba(79, 172, 254, 0.9);
}

button:nth-child(1) {
  background: linear-gradient(145deg, #ff416c, #ff4b2b);
}

button:nth-child(2) {
  background: linear-gradient(145deg, #f7971e, #ffd200);
  color: #000;
}

button:nth-child(4),
button:nth-child(5),
button:nth-child(9),
button:nth-child(13),
button:nth-child(17) {
  color: #4dfcff;
}

    </style>
  </head>

  <body>
    <div class="calculator">

        <input type="text" id="expression" disabled>

        
       <input type="text" id="result" disabled>

       <div class="buttons">
      <button onClick="clearAll()">C</button>
      <button onClick="del()">DEL</button>
      <button onClick="press('/')">÷</button>
      <button onClick="press('*')">×</button>
      <button onClick="press('7')">7</button>
      <button onClick="press('8')">8</button>
      <button onClick="press('9')">9</button>
      <button onClick="press('-')">−</button>
      <button onClick="press('4')">4</button>
      <button onClick="press('5')">5</button>
      <button onClick="press('6')">6</button>
      <button onClick="press('+')">+</button>
      <button onClick="press('1')">1</button>
      <button onClick="press('2')">2</button>
      <button onClick="press('3')">3</button>
      <button onClick="press('%')">%</button>
      <button class="zero" onClick="press('0')">0</button>
     <button class="zero" onClick="press('00')">00</button>

      
      <button onClick="press('.')">.</button>
      <button class="equal" onClick="calculate()">=</button>

    </div>

    </div>

    <script>
      var screen2 = document.getElementById("expression");
      var screen1 = document.getElementById("result");
      

      function press(value) {
        screen2.value += value;
      }
      function clearAll() {
        screen2.value = screen2.value = "";
        screen1.value = screen1.value = "";
        return;
      }

      function del() {
        screen2.value = screen2.value.slice(0, -1);
      }

      function calculate() {
        screen1.value = eval(screen2.value);
      }

    </script>
  </body>
</html>
