<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Div Circle Clock</title>
      <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&family=Montserrat&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="clock-wrapper">

  
  <div class="big-circle">
    

      <div class="time">
        <span id="hours">00</span> :
        <span id="minutes">00</span> :
        <span id="seconds">00</span>
      </div>

      <div class="ampm" id="ampm">AM</div>

    
  </div>

  
  <div class="right-circles">

    <div class="small-circle day">
      <div id="dayName">Sun</div>
      <div>Day</div>
    </div>

    <div class="small-circle date">
      <div id="date">00</div>
      <div>Date</div>
    </div>

    <div class="small-circle month">
      <div id="month">---</div>
      <div>Month</div>
    </div>

    <div class="small-circle year">
      <div id="year">0000</div>
      <div>Year</div>
    </div>

  </div>

</div>

<script src="./main.js"></script>
</body>
</html>
